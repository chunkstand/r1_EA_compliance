[contract]
version = "architecture-contract-v1"
source_root = "src/usfs_r1_ea_sources"
description = "Layer ownership, import boundaries, generated artifacts, command groups, and temporary architecture exceptions for the USFS Region 1 EA reviewer engine."

[[layers]]
name = "foundation"
summary = "Workbook, config, overrides, adapters, and source-row records."
modules = [
  "__init__",
  "adapters",
  "catalog_surface",
  "config",
  "eval_metrics",
  "evidence_strength",
  "overrides",
  "records",
  "source_partitions",
  "workbook",
]
allowed_import_layers = ["foundation"]

[[layers]]
name = "capture"
summary = "Dry-run, preflight, download, batch, report, pilot, and run validation workflows."
modules = ["batches", "download", "dry_run", "pilots", "preflight", "report", "validate_run"]
allowed_import_layers = ["foundation", "capture"]

[[layers]]
name = "catalog"
summary = "Reviewer catalog and source-set promotion surfaces."
modules = ["catalog"]
allowed_import_layers = ["foundation", "capture", "catalog"]

[[layers]]
name = "extraction"
summary = "Artifact extraction, extraction accuracy, and extraction-derived text surfaces."
modules = ["extract", "extraction_accuracy", "extraction_admission"]
allowed_import_layers = ["foundation", "capture", "catalog", "extraction"]

[[layers]]
name = "retrieval"
summary = "Local evidence index construction, validation, query, and retrieval eval support."
modules = ["retrieval"]
allowed_import_layers = ["foundation", "extraction", "retrieval"]

[[layers]]
name = "claims"
summary = "Source-claim extraction and rule-claim binding."
modules = ["claim_extraction", "rule_claim_binding"]
allowed_import_layers = ["foundation", "extraction", "claims", "rule_packs"]

[[layers]]
name = "rule_packs"
summary = "Shared compliance rule-pack loading, schema validation, and rule-pack helper contracts."
modules = ["rule_packs"]
allowed_import_layers = ["foundation", "rule_packs"]

[[layers]]
name = "review"
summary = "EA package review and forest-plan context, component, profile, adjudication, and eval helpers."
modules = [
  "ea_review",
  "forest_plan_component_adjudication",
  "forest_plan_component_eval",
  "forest_plan_component_eval_coverage",
  "forest_plan_components",
  "forest_plan_inventory_build_manifest",
  "forest_plan_profiles",
  "forest_plan_resolver",
]
allowed_import_layers = ["foundation", "extraction", "retrieval", "review"]

[[layers]]
name = "review_support"
summary = "Cross-source-set reuse planning helpers that may inspect review-derived source-set requirements without writing review outputs."
modules = ["authority_currentness", "forest_plan_source_delta_readiness", "reuse_inventory"]
allowed_import_layers = ["foundation", "capture", "catalog", "extraction", "review", "review_support"]

[[layers]]
name = "evidence_graph"
summary = "Document evidence graph build and validation."
modules = ["evidence_graph", "phase_eval_direct_eval", "replay_context"]
allowed_import_layers = [
  "foundation",
  "extraction",
  "claims",
  "review",
  "decision_support",
  "evidence_graph",
]

[[layers]]
name = "knowledge_graph"
summary = "NEPA 3D graph contract and source-set/review export assembly."
modules = ["nepa_3d_graph_contract", "nepa_knowledge_graph_export"]
allowed_import_layers = [
  "foundation",
  "catalog",
  "extraction",
  "retrieval",
  "claims",
  "rule_packs",
  "review",
  "review_support",
  "evidence_graph",
  "package_context",
  "applicability",
  "compliance",
  "knowledge_graph",
]

[[layers]]
name = "package_context"
summary = "Package fact graph context used by applicability."
modules = ["package_fact_graph"]
allowed_import_layers = ["foundation", "review", "package_context"]

[[layers]]
name = "applicability"
summary = "Authority universe, retrieval traces, decisions, validation, adjudication, and generated rule packs."
modules = [
  "applicability",
  "applicability_decisions",
  "applicability_retrieval",
  "applicability_rule_pack",
  "applicability_validation",
]
allowed_import_layers = [
  "foundation",
  "extraction",
  "retrieval",
  "claims",
  "rule_packs",
  "review",
  "package_context",
  "applicability",
]

[[layers]]
name = "compliance"
summary = "Compliance review, compliance input gates, compliance coverage, and compliance gold eval."
modules = [
  "compliance_authority_integration",
  "compliance_coverage",
  "compliance_finding_graph",
  "compliance_findings",
  "compliance_gold_eval",
  "compliance_inputs",
  "compliance_outputs",
  "compliance_review",
  "compliance_review_eval",
  "compliance_validation",
]
allowed_import_layers = [
  "foundation",
  "extraction",
  "retrieval",
  "claims",
  "rule_packs",
  "review",
  "package_context",
  "applicability",
  "compliance",
]

[[layers]]
name = "decision_support"
summary = "Supervisor-facing EA consistency report synthesis over audited review artifacts."
modules = ["ea_consistency_decision_support", "final_qa_certification", "review_packet_index"]
allowed_import_layers = [
  "foundation",
  "decision_support",
]

[[layers]]
name = "project_planning"
summary = "Proposed-action NEPA project requirements and resource SOW package generation before review artifacts exist."
modules = ["project_sow_package"]
allowed_import_layers = [
  "foundation",
  "project_planning",
]

[[layers]]
name = "eval"
summary = "Applicability and V1 EA promotion/evaluation commands."
modules = [
  "applicability_eval",
  "forest_plan_component_retrieval_eval",
  "forest_plan_profile_eval",
  "gold_coverage_eval",
  "promotion_suite",
  "real_package_review_coverage_eval",
  "upstream_evaluation",
  "v1_ea_eval",
]
allowed_import_layers = [
  "foundation",
  "capture",
  "catalog",
  "extraction",
  "retrieval",
  "rule_packs",
  "package_context",
  "applicability",
  "review",
  "compliance",
  "decision_support",
  "project_planning",
  "eval",
]

[[layers]]
name = "cli"
summary = "Stable public command registration and dispatch entrypoints."
modules = [
  "__main__",
  "cli",
  "cli_applicability",
  "cli_capture",
  "cli_common",
  "cli_compliance",
  "cli_decision_support",
  "cli_derived",
  "cli_eval",
  "cli_final_qa",
  "cli_project_planning",
  "cli_review_packet",
  "cli_review",
]
allowed_import_layers = [
  "foundation",
  "capture",
  "catalog",
  "extraction",
  "retrieval",
  "claims",
  "rule_packs",
  "review",
  "review_support",
  "evidence_graph",
  "knowledge_graph",
  "package_context",
  "applicability",
  "compliance",
  "decision_support",
  "project_planning",
  "eval",
  "cli",
]

