    <text x="26" y="0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="730" fill="#435049">SQLite review index</text>
  </g>
  </g>
  <g transform="translate(1258 222)" filter="url(#shadow)">
    <rect width="470" height="188" rx="20" fill="#ffffff" stroke="#d4d9d0"/>
