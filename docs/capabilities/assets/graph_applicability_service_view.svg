    <rect width="470" height="10" rx="5" fill="#1f6f68"/>
    <text x="28" y="54" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="880" fill="#17202a">2. Local Source Library</text>
    <g transform="translate(30 88)">
    <circle cx="8" cy="-6" r="7" fill="#1f6f68"/>
    <text x="26" y="0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="730" fill="#435049">Catalog, manifests, hashes</text>
  </g><g transform="translate(30 118)">
    <circle cx="8" cy="-6" r="7" fill="#1f6f68"/>
    <text x="26" y="0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="730" fill="#435049">Artifact provenance</text>
  </g><g transform="translate(30 148)">
