    <g transform="translate(30 88)">
    <circle cx="8" cy="-6" r="7" fill="#17202a"/>
    <text x="26" y="0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="730" fill="#435049">Defines review universe</text>
  </g><g transform="translate(30 118)">
    <circle cx="8" cy="-6" r="7" fill="#17202a"/>
    <text x="26" y="0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="730" fill="#435049">Preserves row identity</text>
  </g><g transform="translate(30 148)">
    <circle cx="8" cy="-6" r="7" fill="#17202a"/>
    <text x="26" y="0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="730" fill="#435049">Applies scope and exclusions</text>
  </g>
  </g>
  <g transform="translate(665 222)" filter="url(#shadow)">
