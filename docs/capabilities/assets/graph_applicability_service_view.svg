    <text x="26" y="0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="730" fill="#435049">Currentness archive</text>
  </g>
  </g>
  <path d="M 542 316 L 655 316" stroke="#8b948d" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 1135 316 L 1248 316" stroke="#8b948d" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(72 500)" filter="url(#shadow)">
