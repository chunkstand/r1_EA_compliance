    <text x="52" y="54" font-family="Inter, Arial, sans-serif" font-size="15" fill="#58615b">1 record visible as a blocker</text>
  </g>
    <g transform="translate(1136 82)">
    <rect width="486" height="72" rx="18" fill="#f8faf7" stroke="#d4d9d0"/>
    <circle cx="30" cy="36" r="11" fill="#68706a"/>
    <text x="52" y="30" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#17202a">Superseded / currentness-only</text>
    <text x="52" y="54" font-family="Inter, Arial, sans-serif" font-size="15" fill="#58615b">visible for context, not active authority</text>
  </g>
  </g>

