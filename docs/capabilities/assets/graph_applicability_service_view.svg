  </g>
    <g transform="translate(1192 92)">
    <rect width="284" height="98" rx="18" fill="#f8faf7" stroke="#d4d9d0"/>
    <rect width="284" height="8" rx="4" fill="#2e5e88"/>
    <text x="24" y="42" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="860" fill="#17202a">Graph Export</text>
    <text x="24" y="70" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#58615b">validated nodes, edges, and</text><text x="24" y="90" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#58615b">reports</text>
  </g>
    <path d="M 316 152 L 410 152" stroke="#8b948d" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M 702 152 L 796 152" stroke="#8b948d" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
