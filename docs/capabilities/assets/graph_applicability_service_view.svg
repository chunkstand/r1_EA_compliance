    </g>
  <path d="M 820 425 L 1085 320" stroke="#26786f" stroke-width="9" stroke-linecap="round" stroke-opacity="0.58" marker-end="url(#arrowService)"/><g transform="translate(875.5 348.5)">
      <rect width="154" height="42" rx="21" fill="#ffffff" stroke="#d8d3c6" opacity="0.95"/>
      <text x="77" y="27" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#3f4540">33 apply</text>
    </g>
  <path d="M 820 635 L 1085 735" stroke="#8b8a82" stroke-width="8" stroke-linecap="round" stroke-opacity="0.58" marker-end="url(#arrowService)"/><g transform="translate(834.5 661)">
