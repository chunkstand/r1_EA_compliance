    <text x="26" y="0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="730" fill="#435049">Active review corpus</text>
  </g><g transform="translate(30 118)">
    <circle cx="8" cy="-6" r="7" fill="#835b2f"/>
