  <rect width="1800" height="1120" rx="34" fill="#f4f6f2"/>
  <text x="72" y="92" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="880" fill="#17202a">Source governance before analysis</text>
  <text x="72" y="138" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" fill="#58615b">Only cataloged, eligible, current sources can feed review logic. Blocked and superseded material stays visible without becoming</text><text x="72" y="165" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" fill="#58615b">controlling authority.</text>

  <g transform="translate(72 222)" filter="url(#shadow)">
