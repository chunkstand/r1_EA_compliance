    <text x="156" y="78" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="760" fill="#58615b">graph-ready</text>
  </g>
    <g transform="translate(30 248)">
    <rect width="478" height="110" rx="18" fill="#f8faf7" stroke="#d4d9d0"/>
    <text x="24" y="38" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#17202a">Blocked profiles</text>
