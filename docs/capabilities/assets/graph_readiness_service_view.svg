    <text x="156" y="78" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="760" fill="#58615b">visible readiness blockers</text>
  </g>
    <g transform="translate(30 392)">
    <rect width="478" height="110" rx="18" fill="#f8faf7" stroke="#d4d9d0"/>
    <text x="24" y="38" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#17202a">Components</text>
    <text x="24" y="78" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="920" fill="#1f6f68">329</text>
    <text x="156" y="78" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="760" fill="#58615b">inventory-backed</text>
  </g>
    <g transform="translate(30 536)">
    <rect width="478" height="110" rx="18" fill="#f8faf7" stroke="#d4d9d0"/>
    <text x="24" y="38" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#17202a">Profile requirements</text>
    <text x="24" y="78" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="920" fill="#1f6f68">8</text>
    <text x="156" y="78" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="760" fill="#58615b">directives + overlays</text>
  </g>
  </g>
  <text x="92" y="1060" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="850" fill="#1f6f68">Blocked or incomplete sources remain explicit so expansion risk is visible before a package is called ready.</text>
