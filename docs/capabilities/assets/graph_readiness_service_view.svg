    <text x="88" y="66" font-family="Inter, Arial, sans-serif" font-size="17" fill="#58615b">Workbook coverage, source statuses, artifact links</text>
    <rect x="832" y="27" width="126" height="38" rx="19" fill="#1f6f68"/>
    <text x="895" y="52" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850" fill="#ffffff">PASS</text>
  </g><g transform="translate(34 220)">
    <rect width="992" height="92" rx="18" fill="#f8faf7" stroke="#d4d9d0"/>
    <circle cx="48" cy="46" r="22" fill="#1f6f68"/>
    <path d="M 38 46 L 45 54 L 60 36" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="88" y="38" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="870" fill="#17202a">Currentness</text>
    <text x="88" y="66" font-family="Inter, Arial, sans-serif" font-size="17" fill="#58615b">Active, candidate, superseded, and blocked source roles</text>
    <rect x="832" y="27" width="126" height="38" rx="19" fill="#1f6f68"/>
    <text x="895" y="52" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850" fill="#ffffff">PASS</text>
