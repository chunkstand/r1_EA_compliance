    <text x="88" y="66" font-family="Inter, Arial, sans-serif" font-size="17" fill="#58615b">26/26 current gates</text>
    <rect x="832" y="27" width="126" height="38" rx="19" fill="#1f6f68"/>
    <text x="895" y="52" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850" fill="#ffffff">PASS</text>
  </g>
  </g>
  <g transform="translate(1190 224)" filter="url(#shadow)">
    <rect width="538" height="744" rx="24" fill="#ffffff" stroke="#d4d9d0"/>
    <text x="30" y="54" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="880" fill="#17202a">Expansion boundary</text>
    <g transform="translate(30 104)">
    <rect width="478" height="110" rx="18" fill="#f8faf7" stroke="#d4d9d0"/>
