    <text x="0" y="30" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#58615b">future workflows and</text><text x="0" y="49" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#58615b">views</text>
