<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Current NEPA authority stack represented by the graph">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f7f1"/>
      <stop offset="1" stop-color="#e9f2ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#141713" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>
  <text x="64" y="78" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#171713">Current NEPA authority environment mapped as evidence</text>
  <text x="64" y="118" font-family="Inter, Arial, sans-serif" font-size="18" fill="#5f625b">The graph treats statutes, agency procedures, source records, and review decisions as linked evidence - not as unsupported conclusions.</text>
  <g transform="translate(64 172)" filter="url(#shadow)">
    <rect width="240" height="190" rx="18" fill="#ffffff" stroke="#d8d3c6"/>
    <rect width="240" height="9" rx="4" fill="#171713"/>
    <text x="20" y="50" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#171713">NEPA statute</text>
    <text x="20" y="82" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">Baseline procedural</text><text x="20" y="104" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">law still governs</text><text x="20" y="126" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">federal environmental</text><text x="20" y="148" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">review.</text>
  </g>
  <g transform="translate(336 172)" filter="url(#shadow)">
    <rect width="240" height="190" rx="18" fill="#ffffff" stroke="#d8d3c6"/>
    <rect width="240" height="9" rx="4" fill="#7c493c"/>
    <text x="20" y="50" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#171713">CEQ rulemaking status</text>
    <text x="20" y="82" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">CEQ records removal of</text><text x="20" y="104" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">its NEPA regulations;</text><text x="20" y="126" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">older 40 CFR 1500-1508</text><text x="20" y="148" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">rules are historical</text><text x="20" y="170" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">reference.</text>
  </g>
  <g transform="translate(608 172)" filter="url(#shadow)">
    <rect width="240" height="190" rx="18" fill="#ffffff" stroke="#d8d3c6"/>
    <rect width="240" height="9" rx="4" fill="#216a60"/>
    <text x="20" y="50" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#171713">Forest Service layer</text>
    <text x="20" y="82" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">USDA Forest Service</text><text x="20" y="104" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">procedures,</text><text x="20" y="126" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">regulations,</text><text x="20" y="148" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">directives, and</text><text x="20" y="170" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">handbook sources</text>
  </g>
  <g transform="translate(880 172)" filter="url(#shadow)">
    <rect width="240" height="190" rx="18" fill="#ffffff" stroke="#d8d3c6"/>
    <rect width="240" height="9" rx="4" fill="#356a9b"/>
    <text x="20" y="50" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#171713">Reviewer graph</text>
    <text x="20" y="82" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">1,916 nodes / 3,442</text><text x="20" y="104" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">edges with validation,</text><text x="20" y="126" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">provenance, and</text><text x="20" y="148" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">readiness controls.</text>
  </g>
  <path d="M 292 268 L 326 268" stroke="#8a8f84" stroke-width="4" stroke-linecap="round"/>
  <path d="M 316 259 L 326 268 L 316 277" fill="none" stroke="#8a8f84" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 564 268 L 598 268" stroke="#8a8f84" stroke-width="4" stroke-linecap="round"/>
  <path d="M 588 259 L 598 268 L 588 277" fill="none" stroke="#8a8f84" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 836 268 L 870 268" stroke="#8a8f84" stroke-width="4" stroke-linecap="round"/>
  <path d="M 860 259 L 870 268 L 860 277" fill="none" stroke="#8a8f84" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(64 430)" filter="url(#shadow)">
    <rect width="1152" height="130" rx="20" fill="#ffffff" stroke="#d8d3c6"/>
    <text x="30" y="42" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#171713">Why this matters for a client demo</text>
    <text x="30" y="75" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4f554e">The current regulatory picture is moving from a single CEQ code-of-federal-regulations anchor toward agency-specific</text><text x="30" y="96" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4f554e">implementation. The system shows exactly which source record, directive, forest-plan component, applicability decision, and</text>
    <text x="30" y="114" font-family="Inter, Arial, sans-serif" font-size="15" fill="#26786f" font-weight="800">Validation passed: 75 graph checks; 33 applicable and 340 non-applicable authority decisions.</text>
  </g>
</svg>