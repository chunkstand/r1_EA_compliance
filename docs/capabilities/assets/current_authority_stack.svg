<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="NEPA review service process represented by the graph">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f7f1"/>
      <stop offset="1" stop-color="#e9f2ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#141713" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>
  <text x="64" y="78" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#171713">NEPA review service process mapped as evidence</text>
  <text x="64" y="118" font-family="Inter, Arial, sans-serif" font-size="18" fill="#5f625b">Our review process links document inputs, current agency procedures, source evidence, and review decisions - not unsupported conclusions.</text>
  <g transform="translate(64 172)" filter="url(#shadow)">
    <rect width="240" height="190" rx="18" fill="#ffffff" stroke="#d8d3c6"/>
    <rect width="240" height="9" rx="4" fill="#171713"/>
    <text x="20" y="50" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#171713">Document package</text>
    <text x="20" y="82" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">EA, FONSI, ROD,</text><text x="20" y="104" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">appendices, and</text><text x="20" y="126" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">supporting biological,</text><text x="20" y="148" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">cultural, and</text><text x="20" y="170" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">forest-plan records.</text>
  </g>
  <g transform="translate(336 172)" filter="url(#shadow)">
    <rect width="240" height="190" rx="18" fill="#ffffff" stroke="#d8d3c6"/>
    <rect width="240" height="9" rx="4" fill="#216a60"/>
    <text x="20" y="50" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#171713">Current authority graph</text>
    <text x="20" y="82" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">Current regulations,</text><text x="20" y="104" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">agency procedures,</text><text x="20" y="126" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">Forest Plan</text><text x="20" y="148" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">components, and</text><text x="20" y="170" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">project authorities.</text>
  </g>
  <g transform="translate(608 172)" filter="url(#shadow)">
    <rect width="240" height="190" rx="18" fill="#ffffff" stroke="#d8d3c6"/>
    <rect width="240" height="9" rx="4" fill="#7c493c"/>
    <text x="20" y="50" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#171713">Consistency review</text>
    <text x="20" y="82" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">Full profile</text><text x="20" y="104" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">consistency document</text><text x="20" y="126" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">across Forest Plan</text><text x="20" y="148" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">direction and</text><text x="20" y="170" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">applicable laws.</text>
  </g>
  <g transform="translate(880 172)" filter="url(#shadow)">
    <rect width="240" height="190" rx="18" fill="#ffffff" stroke="#d8d3c6"/>
    <rect width="240" height="9" rx="4" fill="#356a9b"/>
    <text x="20" y="50" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#171713">Decision support</text>
    <text x="20" y="82" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">Responsible-official</text><text x="20" y="104" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">briefing with</text><text x="20" y="126" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">applicable</text><text x="20" y="148" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">authorities, gaps,</text><text x="20" y="170" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4f554e">risks, and evidence</text>
  </g>
  <path d="M 292 268 L 326 268" stroke="#8a8f84" stroke-width="4" stroke-linecap="round"/>
  <path d="M 316 259 L 326 268 L 316 277" fill="none" stroke="#8a8f84" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 564 268 L 598 268" stroke="#8a8f84" stroke-width="4" stroke-linecap="round"/>
  <path d="M 588 259 L 598 268 L 588 277" fill="none" stroke="#8a8f84" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 836 268 L 870 268" stroke="#8a8f84" stroke-width="4" stroke-linecap="round"/>
  <path d="M 860 259 L 870 268 L 860 277" fill="none" stroke="#8a8f84" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(64 430)" filter="url(#shadow)">
    <rect width="1152" height="130" rx="20" fill="#ffffff" stroke="#d8d3c6"/>
    <text x="30" y="42" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#171713">Why this matters for a service engagement</text>
    <text x="30" y="75" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4f554e">USFS Region 1 is the worked example. The same process can be run against another NEPA document package by refreshing the authority</text><text x="30" y="96" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4f554e">graph with the most current applicable regulations, mapping project evidence, testing reverse compliance, preparing consistency</text>
    <text x="30" y="114" font-family="Inter, Arial, sans-serif" font-size="15" fill="#26786f" font-weight="800">Example validation passed: 75 graph checks; 33 applicable and 340 non-applicable authority decisions.</text>
  </g>
</svg>