<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="840" viewBox="0 0 1280 840" role="img" aria-label="Architecture components for the NEPA review system">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#17202a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b948d"/>
    </marker>
  </defs>
  <rect width="1280" height="840" rx="28" fill="#f4f6f2"/>
  <rect x="34" y="32" width="1212" height="776" rx="26" fill="#ffffff" stroke="#d4d9d0"/>
  <text x="72" y="86" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="880" fill="#17202a">Architecture components at a glance</text>
  <text x="72" y="126" font-family="Inter, Arial, sans-serif" font-size="18" fill="#58615b">A source-governed review engine with traceable evidence, explicit authority logic, and gated outputs.</text>

  <g transform="translate(76 188)" filter="url(#shadow)">
    <rect width="330" height="150" rx="18" fill="#ffffff" stroke="#d4d9d0"/>
    <rect width="330" height="10" rx="5" fill="#17202a"/>
    <circle cx="28" cy="48" r="10" fill="#17202a"/>
    <text x="48" y="55" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="870" fill="#17202a">Source Contract</text>
    <text x="24" y="92" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">Workbook rows set scope,</text><text x="24" y="113" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">exclusions, source identity, and</text><text x="24" y="134" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">review boundaries.</text>
  </g>
  <g transform="translate(474 188)" filter="url(#shadow)">
    <rect width="330" height="150" rx="18" fill="#ffffff" stroke="#d4d9d0"/>
    <rect width="330" height="10" rx="5" fill="#1f6f68"/>
    <circle cx="28" cy="48" r="10" fill="#1f6f68"/>
    <text x="48" y="55" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="870" fill="#17202a">Audited Source Library</text>
    <text x="24" y="92" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">Catalogs, manifests, hashes,</text><text x="24" y="113" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">partitions, and SQLite preserve</text><text x="24" y="134" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">provenance.</text>
  </g>
  <g transform="translate(872 188)" filter="url(#shadow)">
    <rect width="330" height="150" rx="18" fill="#ffffff" stroke="#d4d9d0"/>
    <rect width="330" height="10" rx="5" fill="#835b2f"/>
    <circle cx="28" cy="48" r="10" fill="#835b2f"/>
    <text x="48" y="55" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="870" fill="#17202a">Evidence Pipeline</text>
    <text x="24" y="92" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">Extraction, retrieval, evidence</text><text x="24" y="113" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">spans, graph edges, and source</text><text x="24" y="134" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">claims.</text>
  </g>
  <path d="M 406 263 L 464 263" stroke="#8b948d" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 804 263 L 862 263" stroke="#8b948d" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(76 416)" filter="url(#shadow)">
    <rect width="330" height="150" rx="18" fill="#ffffff" stroke="#d4d9d0"/>
    <rect width="330" height="10" rx="5" fill="#6f4f86"/>
    <circle cx="28" cy="48" r="10" fill="#6f4f86"/>
    <text x="48" y="55" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="870" fill="#17202a">Authority Engine</text>
    <text x="24" y="92" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">Authority families, currentness,</text><text x="24" y="113" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">rule templates, and applicability</text><text x="24" y="134" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">decisions.</text>
  </g>
  <g transform="translate(474 416)" filter="url(#shadow)">
    <rect width="330" height="150" rx="18" fill="#ffffff" stroke="#d4d9d0"/>
    <rect width="330" height="10" rx="5" fill="#2e5e88"/>
    <circle cx="28" cy="48" r="10" fill="#2e5e88"/>
    <text x="48" y="55" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="870" fill="#17202a">Reviewer Outputs</text>
    <text x="24" y="92" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">Compliance matrix, decision</text><text x="24" y="113" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">support, final QA, and report</text><text x="24" y="134" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">PDFs.</text>
  </g>
  <g transform="translate(872 416)" filter="url(#shadow)">
    <rect width="330" height="150" rx="18" fill="#ffffff" stroke="#d4d9d0"/>
    <rect width="330" height="10" rx="5" fill="#a65332"/>
    <circle cx="28" cy="48" r="10" fill="#a65332"/>
    <text x="48" y="55" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="870" fill="#17202a">Graph Experience</text>
    <text x="24" y="92" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">3D scenes, lenses, search, and</text><text x="24" y="113" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">evidence paths from validated</text><text x="24" y="134" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#58615b">graph JSON.</text>
  </g>
  <path d="M 406 491 L 464 491" stroke="#8b948d" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 804 491 L 862 491" stroke="#8b948d" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(76 640)" filter="url(#shadow)">
    <rect width="1126" height="98" rx="18" fill="#eef5f2" stroke="#c3d5ce"/>
    <text x="28" y="38" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="850" fill="#17202a">Readiness layer</text>
    <text x="28" y="70" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#435049">Validation, phase-eval, promotion, and expansion gates run across the architecture before the system claims reviewer</text><text x="28" y="92" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" fill="#435049">readiness.</text>
  </g>
</svg>