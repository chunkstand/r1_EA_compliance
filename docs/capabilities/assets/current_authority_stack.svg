<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="NEPA review service process represented by the graph">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f7f1"/>
      <stop offset="1" stop-color="#e9f2ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#141713" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>
  <text x="64" y="78" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#171713">NEPA review service process mapped as evidence</text>
  <text x="64" y="118" font-family="Inter, Arial, sans-serif" font-size="18" fill="#5f625b">Our review process links document inputs, current agency procedures, source evidence, and review decisions - not unsupported conclusions.</text>
  <g transform="translate(64 172)" filter="url(#shadow)">
    <rect width="270" height="190" rx="18" fill="#ffffff" stroke="#d8d3c6"/>
    <rect width="270" height="9" rx="4" fill="#171713"/>
    <text x="20" y="50" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="850" fill="#171713">Document package</text>
    <text x="20" y="86" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4f554e">EA, FONSI, ROD, appendices,</text><text x="20" y="106" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4f554e">and supporting records.</text>
  </g>
  <g transform="translate(368 172)" filter="url(#shadow)">
    <rect width="270" height="190" rx="18" fill="#ffffff" stroke="#d8d3c6"/>
    <rect width="270" height="9" rx="4" fill="#216a60"/>
    <text x="20" y="50" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="850" fill="#171713">Current authority graph</text>
    <text x="20" y="86" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4f554e">Current regulations, agency</text><text x="20" y="106" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4f554e">procedures, Forest Plans, and</text><text x="20" y="126" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4f554e">project authorities.</text>
  </g>
  <g transform="translate(672 172)" filter="url(#shadow)">
    <rect width="270" height="190" rx="18" fill="#ffffff" stroke="#d8d3c6"/>
    <rect width="270" height="9" rx="4" fill="#7c493c"/>
    <text x="20" y="50" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="850" fill="#171713">Consistency review</text>
    <text x="20" y="86" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4f554e">Forest Plan plus full profile</text><text x="20" y="106" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4f554e">consistency across applicable</text><text x="20" y="126" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4f554e">laws.</text>
  </g>
  <g transform="translate(976 172)" filter="url(#shadow)">
    <rect width="270" height="190" rx="18" fill="#ffffff" stroke="#d8d3c6"/>
    <rect width="270" height="9" rx="4" fill="#356a9b"/>
    <text x="20" y="50" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="850" fill="#171713">Decision support</text>
    <text x="20" y="86" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4f554e">Findings, gaps, risks, and</text><text x="20" y="106" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4f554e">evidence paths for the</text><text x="20" y="126" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4f554e">responsible official.</text>
  </g>
  <path d="M 334 268 L 358 268" stroke="#8a8f84" stroke-width="4" stroke-linecap="round"/>
  <path d="M 348 259 L 358 268 L 348 277" fill="none" stroke="#8a8f84" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 638 268 L 662 268" stroke="#8a8f84" stroke-width="4" stroke-linecap="round"/>
  <path d="M 652 259 L 662 268 L 652 277" fill="none" stroke="#8a8f84" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 942 268 L 966 268" stroke="#8a8f84" stroke-width="4" stroke-linecap="round"/>
  <path d="M 956 259 L 966 268 L 956 277" fill="none" stroke="#8a8f84" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(64 430)" filter="url(#shadow)">
    <rect width="1152" height="130" rx="20" fill="#ffffff" stroke="#d8d3c6"/>
    <text x="30" y="42" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#171713">Why this matters for a service engagement</text>
    <text x="30" y="75" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4f554e">USFS Region 1 is the current operational proof. The same system pattern can be built for another NEPA package by adding</text><text x="30" y="96" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4f554e">source/profile coverage, mapping project evidence, testing reverse compliance, and replaying validation gates.</text>
    <text x="30" y="114" font-family="Inter, Arial, sans-serif" font-size="15" fill="#26786f" font-weight="800">Validation passed: 75 graph checks and 107 decision-support checks.</text>
  </g>
</svg>