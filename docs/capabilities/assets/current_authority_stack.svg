    <text x="0" y="38" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#58615b">relational graph</text><text x="0" y="57" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#58615b">foundation</text>
