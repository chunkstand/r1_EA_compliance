<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="System process from controlled source library to decision support">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#17202a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b948d"/>
    </marker>
  </defs>
  <rect width="1280" height="640" rx="28" fill="#f4f6f2"/>
  <rect x="34" y="32" width="1212" height="576" rx="26" fill="#ffffff" stroke="#d4d9d0"/>
  <text x="72" y="85" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="880" fill="#17202a">System process: controlled evidence to review support</text>
  <text x="72" y="125" font-family="Inter, Arial, sans-serif" font-size="18" fill="#58615b">The review engine keeps source capture, evidence, authority logic, and decision-support outputs traceable.</text>
  <g transform="translate(72 182)" filter="url(#shadow)">
    <rect width="256" height="200" rx="18" fill="#ffffff" stroke="#d4d9d0"/>
    <rect width="256" height="9" rx="4" fill="#17202a"/>
    <text x="20" y="50" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#17202a">Workbook source</text><text x="20" y="73" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#17202a">contract</text>
    <text x="20" y="110" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="900" fill="#17202a">190</text>
    <text x="20" y="148" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#58615b">catalog records; row</text><text x="20" y="168" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#58615b">identity, scope, URLs</text>
  </g>
  <g transform="translate(368 182)" filter="url(#shadow)">
    <rect width="256" height="200" rx="18" fill="#ffffff" stroke="#d4d9d0"/>
    <rect width="256" height="9" rx="4" fill="#1f6f68"/>
    <text x="20" y="50" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#17202a">Audited local corpus</text>
    <text x="20" y="110" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="900" fill="#1f6f68">160</text>
    <text x="20" y="148" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#58615b">unique artifacts; hashes,</text><text x="20" y="168" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#58615b">manifests, SQLite</text>
  </g>
  <g transform="translate(664 182)" filter="url(#shadow)">
    <rect width="256" height="200" rx="18" fill="#ffffff" stroke="#d4d9d0"/>
    <rect width="256" height="9" rx="4" fill="#835b2f"/>
    <text x="20" y="50" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#17202a">Authority graph</text>
    <text x="20" y="110" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="900" fill="#835b2f">35</text>
    <text x="20" y="148" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#58615b">authority families;</text><text x="20" y="168" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#58615b">currentness, partitions,</text>
  </g>
  <g transform="translate(960 182)" filter="url(#shadow)">
    <rect width="256" height="200" rx="18" fill="#ffffff" stroke="#d4d9d0"/>
    <rect width="256" height="9" rx="4" fill="#2e5e88"/>
    <text x="20" y="50" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#17202a">Review outputs</text>
    <text x="20" y="110" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="900" fill="#2e5e88">26/26</text>
    <text x="20" y="148" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#58615b">current gates; matrix,</text><text x="20" y="168" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" fill="#58615b">support, QA, viewer</text>
  </g>
  <path d="M 330 282 L 358 282" stroke="#8b948d" stroke-width="4" stroke-linecap="round"/>
  <path d="M 348 273 L 358 282 L 348 291" fill="none" stroke="#8b948d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 626 282 L 654 282" stroke="#8b948d" stroke-width="4" stroke-linecap="round"/>
  <path d="M 644 273 L 654 282 L 644 291" fill="none" stroke="#8b948d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 922 282 L 950 282" stroke="#8b948d" stroke-width="4" stroke-linecap="round"/>
  <path d="M 940 273 L 950 282 L 940 291" fill="none" stroke="#8b948d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(72 452)">
    <rect width="1136" height="98" rx="18" fill="#eef5f2" stroke="#c3d5ce"/>
    <text x="28" y="38" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="850" fill="#17202a">Design principle</text>
    <text x="28" y="70" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#435049">Domain knowledge stays in data and artifacts: source rows, authority-family configs, rule templates, eval fixtures, graph</text><text x="28" y="91" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#435049">contracts, and reviewer-facing reports.</text>
  </g>
</svg>